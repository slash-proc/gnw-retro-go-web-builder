# Dev-only HTTPS reverse proxy in front of the Vite dev server (service `dev:3000`).
# Gives LAN clients a SECURE CONTEXT (https://) so WebUSB's navigator.usb is exposed —
# a plain http://<lan-ip|name>:3000 origin is non-secure and strips WebUSB.
# Self-signed cert is generated at container start (see entrypoint.sh).

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 80;
  server_name _;
  # Send everyone to HTTPS (the whole point is the secure context).
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  server_name _;

  ssl_certificate     /etc/nginx/certs/dev.crt;
  ssl_certificate_key /etc/nginx/certs/dev.key;

  # Large flash images / dumps stream through; don't cap the body.
  client_max_body_size 0;

  location / {
    proxy_pass http://dev:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Vite HMR websocket upgrade.
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 86400;
  }
}
